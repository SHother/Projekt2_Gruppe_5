<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Se Ønskeseddel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="text-center mb-5">
        <h1 th:text="${wishlist.title}">Ønskeseddel</h1>
        <p class="lead" th:text="${wishlist.description}">Beskrivelse</p>
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col" th:each="wish : ${wishes}">
            <div class="card h-100 shadow-sm" th:classappend="${wish.isReserved} ? 'opacity-50 border-warning' : ''">
                <div class="card-body">
                    <h5 class="card-title" th:text="${wish.title}">Titel</h5>
                    <p class="card-text" th:text="'Pris: ' + ${wish.price} + ' kr.'"></p>
                    <a th:if="${wish.url}" th:href="${wish.url}" class="btn btn-outline-primary btn-sm mb-3">Besøg butik</a>
                    
                    <div th:if="${wish.isReserved}">
                        <button class="btn btn-secondary w-100" disabled>Allerede reserveret</button>
                    </div>
                    <div th:unless="${wish.isReserved}">
                        <form th:action="@{/share/reserve/{id}(id=${wish.wish_id})}" method="post">
                            <button type="submit" class="btn btn-warning w-100 text-dark">Reserver ønske</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
